<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="200" height="120">
 <g stroke="#6E4E22" stroke-width="3" stroke-linecap="round">
  <!-- back rail -->
  <line x1="16" y1="40" x2="184" y2="40" stroke="#8C5A2B"/>
  <!-- posts -->
  <line x1="16" y1="30" x2="16" y2="96"/>
  <line x1="72" y1="30" x2="72" y2="96"/>
  <!-- open gate gap between 72 and 128 -->
  <line x1="128" y1="30" x2="128" y2="96"/>
  <line x1="184" y1="30" x2="184" y2="96"/>
  <!-- lower rail (broken at gate) -->
  <line x1="16" y1="74" x2="72" y2="74" stroke="#8C5A2B"/>
  <line x1="128" y1="74" x2="184" y2="74" stroke="#8C5A2B"/>
 </g>
 <!-- swung-open gate -->
 <line x1="128" y1="96" x2="150" y2="112" stroke="#B8863A" stroke-width="3" stroke-linecap="round"/>
 <text x="100" y="112" text-anchor="middle" font-family="monospace" font-size="11" fill="#6E4E22">STRAY PEN</text>
</svg>
